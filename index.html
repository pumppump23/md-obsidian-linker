<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#121212">
  <title>MD Obsidian Linker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #121212; color: #eee; line-height: 1.5;
      overscroll-behavior-y: contain;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 1.15rem; margin-bottom: 12px; color: #fff; display: flex; align-items: center; gap: 8px; }
    .badge {
      display: inline-block; background: #30d158; color: #000; font-size: 0.6rem;
      font-weight: 700; padding: 2px 6px; border-radius: 4px;
    }
    .badge.blue { background: #0a84ff; color: #fff; }
    label { font-size: 0.8rem; color: #aaa; display: block; margin: 12px 0 4px; font-weight: 600; }
    textarea, input[type="text"] {
      width: 100%; background: #1e1e1e; border: none; border-radius: 10px;
      color: #fff; font-size: 0.95rem; padding: 10px 12px; outline: none; resize: none;
    }
    textarea { min-height: 120px; }
    .actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    button {
      background: #0a84ff; color: #fff; border: none; padding: 10px 18px;
      border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    }
    button:active { opacity: 0.7; }
    button.secondary { background: #333; color: #ccc; }
    button.danger { background: #ff453a; }

    .preview-box {
      background: #1e1e1e; border-radius: 10px; padding: 12px; margin-top: 8px;
      min-height: 80px; white-space: pre-wrap; word-break: break-word;
      font-size: 0.95rem; color: #ddd;
    }
    .preview-box .link { color: #0a84ff; font-weight: 600; }

    .history { margin-top: 20px; }
    .history h2 { font-size: 1rem; margin-bottom: 10px; color: #ccc; }
    .card {
      background: #1e1e1e; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;
      position: relative;
    }
    .card-title { font-size: 0.8rem; color: #888; margin-bottom: 6px; }
    .card-body { white-space: pre-wrap; word-break: break-word; font-size: 0.9rem; color: #ddd; }
    .card-body .link { color: #0a84ff; font-weight: 600; }
    .card-meta {
      display: flex; justify-content: space-between; align-items: center; margin-top: 8px;
      font-size: 0.75rem; color: #666;
    }
    .card-meta button { padding: 4px 10px; font-size: 0.75rem; border-radius: 6px; }
    .empty { text-align: center; color: #555; padding: 30px 0; font-size: 0.9rem; }
    .hint { font-size: 0.75rem; color: #666; margin-top: 4px; }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MD Obsidian Linker <span class="badge">OFFLINE</span></h1>

    <label>マークダウンテキスト</label>
    <textarea id="mdInput" placeholder="ここにMarkdownテキストを貼り付け..."></textarea>

    <label>リンク化する文字列（カンマまたは改行区切り）</label>
    <textarea id="keywordsInput" placeholder="AI, Markdown, Obsidian,
初心者,効率化"></textarea>
    <div class="hint">例: AI, Obsidian, PWA, メモ帳</div>

    <div class="actions">
      <button class="secondary" onclick="clearAll()">クリア</button>
      <button onclick="convert()">変換 & プレビュー</button>
      <button onclick="saveResult()">保存</button>
      <button class="secondary" onclick="copyResult()">コピー</button>
    </div>

    <label>プレビュー</label>
    <div id="preview" class="preview-box">（変換結果がここに表示されます）</div>

    <div class="history">
      <h2>保存履歴</h2>
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    const DB_NAME = 'md-linker';
    const STORE = 'conversions';
    const dbReq = indexedDB.open(DB_NAME, 1);
    let db;

    dbReq.onupgradeneeded = (e) => {
      const st = e.target.result.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
      st.createIndex('created', 'created', { unique: false });
    };
    dbReq.onsuccess = (e) => { db = e.target.result; renderHistory(); };
    dbReq.onerror = () => alert('IndexedDBにアクセスできません');

    function txStore(mode = 'readonly') {
      return db.transaction(STORE, mode).objectStore(STORE);
    }

    // 既に [[...]] で囲まれているものを避ける
    function escapeRegex(s) {
      return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function convert() {
      let text = document.getElementById('mdInput').value;
      const rawKeywords = document.getElementById('keywordsInput').value;
      if (!text || !rawKeywords.trim()) {
        setPreview('テキストとキーワードの両方を入力してください');
        return;
      }
      const keywords = rawKeywords
        .split(/[,\n]/)
        .map(s => s.trim())
        .filter(Boolean)
        .sort((a, b) => b.length - a.length); // 長いものから置換で誤置換防止

      // すでにリンク化されている箇所を一時退避
      const linked = [];
      text = text.replace(/\[\[([^\]]+)\]\]/g, (m, g1) => {
        linked.push(g1);
        return `__OBSIDIAN_LINK_${linked.length - 1}__`;
      });

      for (const kw of keywords) {
        const re = new RegExp(escapeRegex(kw), 'g');
        text = text.replace(re, `[[${kw}]]`);
      }

      // 退避していたリンクを復元
      text = text.replace(/__OBSIDIAN_LINK_(\d+)__/g, (_, i) => `[[${linked[i]}]]`);

      setPreview(text);
      window._lastConverted = text;
    }

    function setPreview(htmlText) {
      const el = document.getElementById('preview');
      el.innerHTML = htmlText
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\[\[([^\]]+)\]\]/g, '<span class="link">[[$1]]</span>');
    }

    function copyResult() {
      const text = window._lastConverted;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => alert('クリップボードにコピーしました'));
    }

    function saveResult() {
      const text = window._lastConverted;
      if (!text) { alert('先に変換してください'); return; }
      const original = document.getElementById('mdInput').value;
      const keywords = document.getElementById('keywordsInput').value;
      const item = { original, keywords, text, created: Date.now() };
      const req = txStore('readwrite').add(item);
      req.onsuccess = () => { alert('保存しました'); renderHistory(); };
    }

    function deleteHistory(id) {
      if (!confirm('削除しますか？')) return;
      txStore('readwrite').delete(id).onsuccess = () => renderHistory();
    }

    function restoreHistory(id) {
      const req = txStore().get(id);
      req.onsuccess = () => {
        const d = req.result;
        if (!d) return;
        document.getElementById('mdInput').value = d.original;
        document.getElementById('keywordsInput').value = d.keywords;
        setPreview(d.text);
        window._lastConverted = d.text;
        window.scrollTo({ top: 0, behavior: 'instant' });
      };
    }

    function renderHistory() {
      if (!db) return;
      const req = txStore().getAll();
      req.onsuccess = () => {
        const items = req.result.sort((a, b) => b.created - a.created);
        const list = document.getElementById('historyList');
        if (!items.length) { list.innerHTML = '<div class="empty">保存履歴はありません</div>'; return; }
        list.innerHTML = items.map(it => {
          const date = new Date(it.created).toLocaleString('ja-JP', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
          const kwList = it.keywords.split(/[,\n]/).filter(Boolean).slice(0, 3).map(k => k.trim()).join(', ') + (it.keywords.split(/[,\n]/).filter(Boolean).length > 3 ? '...' : '');
          const preview = it.text.slice(0, 180).replace(/\[\[([^\]]+)\]\]/g, '<span class="link">[[$1]]</span>') + (it.text.length > 180 ? '...' : '');
          return `<div class="card">
            <div class="card-title">${date} ・ キーワード: ${kwList || '-'}</div>
            <div class="card-body">${preview}</div>
            <div class="card-meta">
              <span>${it.text.length}文字</span>
              <div>
                <button class="secondary" onclick="restoreHistory(${it.id})">復元</button>
                <button class="danger" onclick="deleteHistory(${it.id})">削除</button>
              </div>
            </div>
          </div>`;
        }).join('');
      };
    }

    function clearAll() {
      document.getElementById('mdInput').value = '';
      document.getElementById('keywordsInput').value = '';
      document.getElementById('preview').textContent = '（変換結果がここに表示されます）';
      window._lastConverted = null;
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
